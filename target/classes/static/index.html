<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#" id="navAll">Task Manager</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navSaveTask">Save Task</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navUpcoming">Upcoming Task</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" id="navPast">Past Task</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="#" id="logoutBtn">Logout</a>
                    </li>
                </ul>
                <span class="navbar-text ml-auto">
                    Welcome, <span id="displayUsername" class="font-weight-bold mr-3">User</span>
                    Total Tasks: <span id="taskCount" class="badge badge-primary">0</span>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="addTaskSection" class="card mb-4">
            <div class="card-header">
                Add New Task
            </div>
            <div class="card-body">
                <form id="taskForm">
                    <div class="form-group">
                        <label for="title">Task Title</label>
                        <input type="text" class="form-control" id="title" required>
                    </div>
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea class="form-control" id="description" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="dueDate">Due Date</label>
                        <input type="date" class="form-control" id="dueDate">
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                Your Tasks
            </div>
            <ul id="taskList" class="list-group list-group-flush">
                <!-- Tasks will be loaded here by JavaScript -->
            </ul>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
